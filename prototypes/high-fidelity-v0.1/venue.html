<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#17201e" />
  <title>記憶醸造所｜会場作品</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="venue-body">
  <main class="venue-shell">
    <canvas id="venueCanvas"></canvas>
    <div class="venue-grain" aria-hidden="true"></div>

    <header class="venue-header">
      <div class="brand-lockup light-brand">
        <span class="brand-mark"></span>
        <div>
          <p class="eyebrow">COLLECTIVE BREW</p>
          <h1>本日の仕込み</h1>
        </div>
      </div>
      <div class="venue-counter">
        <strong id="participantCount">12</strong>
        <span>人の記憶</span>
      </div>
    </header>

    <section class="venue-copy">
      <p class="step-label light">一人一杯、みんなで一仕込み。</p>
      <h2 id="venueTitle">雪と海風のあいだ</h2>
      <p id="venueSub">参加者の記憶が加わるたび、音と光の層が変化します。</p>
    </section>

    <div class="venue-regions">
      <div><span class="region-dot snow"></span><strong>金沢</strong><small id="kanazawaCount">5</small></div>
      <div><span class="region-dot sea"></span><strong>能登</strong><small id="notoCount">4</small></div>
      <div><span class="region-dot water"></span><strong>白山</strong><small id="hakusanCount">3</small></div>
    </div>

    <div class="venue-controls">
      <button id="simulateMemory" class="secondary-button dark" type="button">記憶を1件追加</button>
      <button id="venueReplay" class="primary-button compact-button" type="button">全体作品を開栓</button>
      <a href="./index.html" class="text-link light-link">個人体験へ戻る</a>
    </div>
  </main>
  <script src="./venue.js"></script>
</body>
</html>
